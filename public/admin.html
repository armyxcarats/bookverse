<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bookverse Admin</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .dt-button { margin-right: 8px; }
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
    .modal .card { width: 760px; max-height: 90vh; overflow-y: auto; padding: 20px; }
    .image-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .image-preview img { width: 88px; height: 88px; object-fit: cover; border: 1px solid #ddd; border-radius: 4px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row label { flex: 1 1 220px; display: block; }
    .form-row input { width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <header style="text-align:center; padding:20px; background: #f7fafc;"><h2>Bookverse - Admin</h2></header>
  <main style="max-width:1100px; margin:20px auto;">
    <div style="margin-bottom:12px; display:flex; gap:10px; align-items:center; position: relative;">
      <button id="itemsBtn" class="button button-secondary">Manage Books</button>
      <button id="ordersBtn" class="button button-secondary">View Orders</button>
      <button id="usersBtn" class="button button-secondary">Manage Users</button>
      <button id="addBtn" class="button button-primary">Add book</button>
      <button id="refreshBtn" class="button button-secondary">Refresh</button>
      <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
        <button id="authBtn" class="button button-secondary">Login</button>
        <button id="openStore" class="button button-secondary" onclick="location.href='/'">Open Store</button>
      </div>
    </div>
    <table id="itemsTable" class="display" style="width:100%"></table>
    <div id="ordersSection" style="display:none; margin-top: 24px;">
      <h3>Order Transactions</h3>
      <table id="ordersTable" class="display" style="width:100%"></table>
      <div id="ordersMessage" class="message" style="display:none; margin-top:12px;"></div>
    </div>
    <div id="usersSection" style="display:none; margin-top: 24px;">
      <h3>User Management</h3>
      <table id="usersTable" class="display" style="width:100%"></table>
      <div id="usersMessage" class="message" style="display:none; margin-top:12px;"></div>
    </div>
  </main>

  <div id="editModal" class="modal">
    <div class="card">
      <h3 id="modalTitle">Add Book</h3>
      <div class="form-row">
        <label>Title<input id="m-title" type="text"></label>
        <label>Cost Price<input id="m-cost" type="number" step="0.01"></label>
      </div>
      <div class="form-row">
        <label>Sell Price<input id="m-price" type="number" step="0.01"></label>
        <label>Quantity<input id="m-quantity" type="number"></label>
      </div>
      <div class="form-row">
        <label>Genre<input id="m-genre" type="text" placeholder="e.g. Fiction, Science"></label>
        <label>Sale %<input id="m-sale" type="number" min="0" max="90" placeholder="e.g. 25"></label>
      </div>
      <label>Description<textarea id="m-description" rows="4" placeholder="Write a short 2-3 sentence book description"></textarea></label>
      <label>Images (select multiple)<input id="m-images" type="file" multiple accept="image/png,image/jpeg"></label>
      <div>
        <strong>Existing saved images</strong>
        <div id="existingImages" class="image-preview"></div>
      </div>
      <div style="display:flex; gap:10px; margin-top:12px;"><button id="saveBtn" class="button button-primary">Save</button><button id="cancelBtn" class="button button-secondary">Cancel</button></div>
      <div id="modalMsg" style="margin-top:12px; display:none;" class="message"></div>
    </div>
  </div>

  <div id="loginModal" class="modal">
    <div class="card" style="width:360px;">
      <h3>Admin Login</h3>
      <label>Email<input id="adminEmail" type="email" /></label>
      <label>Password<input id="adminPassword" type="password" /></label>
      <div style="display:flex; gap:10px; margin-top:12px;"><button id="loginSubmit" class="button button-primary">Login</button><button id="loginCancel" class="button button-secondary">Cancel</button></div>
      <div id="loginMsg" class="message" style="display:none; margin-top:10px;"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script>
    let table;
    let editingId = null;

    function getToken() { return localStorage.getItem('bookverseToken'); }
    function getStoredUser() {
      const raw = localStorage.getItem('bookverseUser');
      return raw ? JSON.parse(raw) : null;
    }
    function safeUrl(path) {
      if (!path) return '';
      return path.startsWith('http') || path.startsWith('/') ? path : '/' + path;
    }

    async function verifyAdminAccess() {
      const token = getToken();
      if (!token) return false;
      const stored = getStoredUser();
      if (stored && stored.role === 'admin') {
        return true;
      }
      try {
        const response = await $.ajax({
          url: '/api/v1/me',
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` },
          dataType: 'json'
        });
        if (response && response.user && response.user.role === 'admin') {
          localStorage.setItem('bookverseUser', JSON.stringify(response.user));
          return true;
        }
      } catch (xhr) {
        // ignore
      }
      return false;
    }

    function showExistingImages(images = []) {
      const container = $('#existingImages');
      container.empty();
      if (!images.length) {
        container.text('No saved images yet.');
        return;
      }
      images.forEach(img => {
        container.append(`<img src="${safeUrl(img.file_path)}" alt="item image">`);
      });
    }

    function showModal(edit=false, data={}){
      editingId = edit ? data.item_id || data.id : null;
      $('#modalTitle').text(edit ? 'Edit Book' : 'Add Book');
      $('#m-title').val(data.description || '');
      $('#m-description').val(data.description_text || '');
      $('#m-cost').val(data.cost_price || '');
      $('#m-price').val(data.sell_price || '');
      $('#m-quantity').val(data.Stock ? data.Stock.quantity : (data.quantity||0));
      $('#m-sale').val(data.sale != null ? data.sale : '');
      $('#m-images').val('');
      const existingImages = edit ? (Array.isArray(data.ItemImages) ? data.ItemImages : []) : [];
      if (edit && data.img_path && !existingImages.some(img => img.file_path === data.img_path)) {
        existingImages.unshift({ file_path: data.img_path });
      }
      showExistingImages(existingImages);
      $('#modalMsg').hide();
      $('#editModal').css('display','flex');
    }
    function hideModal(){ $('#editModal').hide(); }

    async function loadItems(){
      const data = await $.ajax({
        url: '/api/v1/items',
        method: 'GET',
        dataType: 'json'
      });
      const rows = Array.isArray(data) ? data : data.rows || data.items || data.data || [];
      const items = rows;
      if (!table){
        table = $('#itemsTable').DataTable({
          data: items,
          columns: [
            { title: 'ID', data: 'item_id' },
            { title: 'Title', data: 'description' },
            { title: 'Genre', data: 'genre' },
        { title: 'Description', data: 'description_text', render: d => d ? (d.length > 80 ? d.slice(0, 80) + '...' : d) : '' },
            { title: 'Cost', data: 'cost_price', render: v => v ? '₱'+Number(v).toFixed(2) : '' },
              { title: 'Sell Price', data: 'sell_price', render: v => v ? '₱'+Number(v).toFixed(2) : '' },
            { title: 'Qty', data: 'Stock.quantity', defaultContent: '0' },
            { title: 'Sale', data: 'sale', render: v => v ? `${v}%` : 'No' },
            { title: 'Images', data: 'ItemImages', render: arr => Array.isArray(arr) ? arr.length : 0 },
            { title: 'Actions', data: null, orderable:false, render: (data, type, row) => {
                const saleAction = row.sale ? `<button class='clearSaleBtn'>Clear Sale</button>` : `<button class='saleBtn'>Mark Sale</button>`;
                return `<button class='editBtn'>Edit</button> <button class='delBtn'>Delete</button> ${saleAction}`;
              }
            }
          ]
        });

        $('#itemsTable tbody').on('click','button.editBtn', function(){
          const row = table.row($(this).parents('tr')).data();
          showModal(true, row);
        });
        $('#itemsTable tbody').on('click','button.delBtn', async function(){
          const row = table.row($(this).parents('tr')).data();
          if (!confirm('Delete '+(row.description||row.title))) return;
          try{
            const token = getToken();
            await $.ajax({
              url: `/api/v1/items/${row.item_id}`,
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` }
            });
            table.row($(this).parents('tr')).remove().draw();
          }catch(e){ alert('Delete failed. Make sure you are logged in.'); }
        });
        $('#itemsTable tbody').on('click','button.saleBtn', async function(){
          const row = table.row($(this).parents('tr')).data();
          const percent = prompt('Enter sale percentage (1-90):', row.sale || '25');
          const value = percent ? Number(percent) : 0;
          if (!Number.isInteger(value) || value < 1 || value > 90) {
            alert('Sale percentage must be a number between 1 and 90.');
            return;
          }
          try {
            const token = getToken();
            await $.ajax({
              url: `/api/v1/items/${row.item_id}`,
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${token}` },
              data: JSON.stringify({ sale: value, description: row.description, description_text: row.description_text, genre: row.genre, cost_price: row.cost_price, sell_price: row.sell_price, quantity: row.Stock?.quantity || 0 }),
              contentType: 'application/json'
            });
            loadItems();
          } catch (e) {
            alert('Mark sale failed. Make sure you are logged in.');
          }
        });
        $('#itemsTable tbody').on('click','button.clearSaleBtn', async function(){
          const row = table.row($(this).parents('tr')).data();
          if (!confirm('Remove sale from this item?')) return;
          try {
            const token = getToken();
            await $.ajax({
              url: `/api/v1/items/${row.item_id}`,
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${token}` },
              data: JSON.stringify({ sale: null, description: row.description, description_text: row.description_text, genre: row.genre, cost_price: row.cost_price, sell_price: row.sell_price, quantity: row.Stock?.quantity || 0 }),
              contentType: 'application/json'
            });
            loadItems();
          } catch (e) {
            alert('Clear sale failed. Make sure you are logged in.');
          }
        });
      } else {
        table.clear().rows.add(items).draw();
      }
    }

    $('#addBtn').on('click', ()=> showModal(false,{}));
    $('#refreshBtn').on('click', loadItems);
    $('#itemsBtn').on('click', showItemsSection);
    $('#ordersBtn').on('click', showOrdersSection);
    $('#usersBtn').on('click', showUsersSection);
    $('#cancelBtn').on('click', hideModal);

    $('#saveBtn').on('click', async ()=>{
      const title = $('#m-title').val();
      const cost = $('#m-cost').val();
      const price = $('#m-price').val();
      const qty = $('#m-quantity').val();
      const sale = $('#m-sale').val();
      const files = $('#m-images')[0].files;

      if (!title || !cost || !price) { $('#modalMsg').text('Title, cost and sell price are required').show(); return; }

      const form = new FormData();
      form.append('description', title);
      form.append('description_text', $('#m-description').val() || '');
      form.append('genre', $('#m-genre').val() || '');
      form.append('cost_price', cost);
      form.append('sell_price', price);
      form.append('quantity', qty || 0);
      form.append('sale', sale ? Number(sale) : '');
      for (let i = 0; i < files.length; i++) {
        form.append('images', files[i]);
      }

      try{
        const token = getToken();
        const url = editingId ? `/api/v1/items/${editingId}` : '/api/v1/items';
        await $.ajax({
          url,
          method: editingId ? 'PUT' : 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
          data: form,
          processData: false,
          contentType: false,
          dataType: 'json'
        });
        hideModal();
        await loadItems();
      }catch(e){
        $('#modalMsg').text('Save failed. Ensure you are logged in and have permission.').show();
      }
    });

    function showAdminUI(){
      $('#itemsTable').show();
      $('#ordersSection').hide();
      $('#usersSection').hide();
      $('#itemsBtn, #ordersBtn, #usersBtn, #addBtn, #refreshBtn').show();
      setAuthUI();
      loadItems();
    }

    function hideAdminUI(){
      $('#itemsTable').hide();
      $('#ordersSection').hide();
      $('#usersSection').hide();
      $('#itemsBtn, #ordersBtn, #usersBtn, #addBtn, #refreshBtn').hide();
    }

    function showItemsSection(){
      $('#ordersSection').hide();
      $('#usersSection').hide();
      $('#itemsTable').show();
      $('#addBtn, #refreshBtn').show();
    }

    function showOrdersSection(){
      $('#itemsTable').hide();
      $('#usersSection').hide();
      $('#ordersSection').show();
      $('#addBtn, #refreshBtn').hide();
      loadOrders();
    }

    function showUsersSection(){
      $('#itemsTable').hide();
      $('#ordersSection').hide();
      $('#usersSection').show();
      $('#addBtn, #refreshBtn').hide();
      loadUsers();
    }

    async function initializeAdminPage() {
      setAuthUI();
      const isAdmin = await verifyAdminAccess();
      if (isAdmin) {
        showAdminUI();
      } else {
        hideAdminUI();
        showLoginModal();
      }
    }

    $(document).ready(async ()=>{
      await initializeAdminPage();
    });

    function setAuthUI() {
      const btn = document.getElementById('authBtn');
      if (!btn) return;
      const token = getToken();
      if (token) {
        btn.textContent = 'Logout';
        btn.onclick = () => {
          localStorage.removeItem('bookverseToken');
          localStorage.removeItem('bookverseUser');
          setAuthUI();
          hideAdminUI();
          showLoginModal();
        };
      } else {
        btn.textContent = 'Login';
        btn.onclick = showLoginModal;
      }
    }

    async function loadOrders() {
      const token = getToken();
      const message = $('#ordersMessage');
      if (!token) {
        message.text('Please login first.').show();
        return;
      }

      let orders;
      try {
        orders = await $.ajax({
          url: '/api/v1/orders',
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` },
          dataType: 'json'
        });
      } catch (xhr) {
        const body = xhr.responseJSON || {};
        message.text(body.error || 'Unable to load orders.').show();
        return;
      }

      message.hide();
      if (!window.orderTable) {
        window.orderTable = $('#ordersTable').DataTable({
          data: orders,
          columns: [
            { title: 'Order #', data: 'order_id' },
            { title: 'Customer', data: 'customer_name' },
            { title: 'Email', data: 'customer_email' },
            { title: 'Placed', data: 'date_placed' },
            { title: 'Shipped', data: 'date_shipped' },
            { title: 'Status', data: 'status', render: (v, t, row) => {
                const statuses = ['pending', 'delivered', 'cancelled'];
                return `<select class="status-select" data-order-id="${row.order_id}">${statuses.map(s => `<option value="${s}" ${s === v ? 'selected' : ''}>${s}</option>`).join('')}</select>`;
              }
            },
            { title: 'Address', data: 'shipping_address' },
            { title: 'Zip Code', data: 'shipping_zipcode' },
            { title: 'Items', data: 'items' },
            { title: 'Total', data: 'total_amount', render: v => v ? '₱' + Number(v).toFixed(2) : '₱0.00' },
            { title: 'Actions', data: null, orderable: false, render: () => '<button class="delete-order">Delete</button>' }
          ]
        });

        $('#ordersTable tbody').on('change', 'select.status-select', async function() {
          const orderId = $(this).data('order-id');
          const status = $(this).val();
          try {
            const data = await $.ajax({
              url: `/api/v1/orders/${orderId}/status`,
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              data: JSON.stringify({ status }),
              dataType: 'json'
            });
            message.text(`Order #${orderId} status updated to ${data.status}`).show();
            loadOrders();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Unable to update status').show();
          }
        });

        $('#ordersTable tbody').on('click', 'button.delete-order', async function() {
          const row = window.orderTable.row($(this).parents('tr')).data();
          if (!confirm('Delete order #' + row.order_id + '?')) return;
          try {
            await $.ajax({
              url: '/api/v1/orders/' + row.order_id,
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` }
            });
            message.text('Order deleted').show();
            loadOrders();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Delete failed').show();
          }
        });
      } else {
        window.orderTable.clear().rows.add(orders).draw();
      }
    }

    async function loadUsers() {
      const token = getToken();
      const message = $('#usersMessage');
      if (!token) {
        message.text('Please login first.').show();
        return;
      }

      let data;
      try {
        data = await $.ajax({
          url: '/api/v1/users',
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` },
          dataType: 'json'
        });
      } catch (xhr) {
        const body = xhr.responseJSON || {};
        message.text(body.error || 'Unable to load users.').show();
        return;
      }

      const users = Array.isArray(data) ? data : data.users || [];
      message.hide();

      if (!window.userTable) {
        window.userTable = $('#usersTable').DataTable({
          data: users,
          columns: [
            { title: 'ID', data: 'id' },
            { title: 'Name', data: 'name' },
            { title: 'Email', data: 'email' },
            { title: 'Role', data: 'role', render: (v, t, row) => {
                return `<select class="role-select" data-user-id="${row.id}"><option value="user" ${row.role === 'user' ? 'selected' : ''}>user</option><option value="admin" ${row.role === 'admin' ? 'selected' : ''}>admin</option></select>`;
              }
            },
            { title: 'Status', data: 'deleted_at', render: v => v ? 'Deactivated' : 'Active' },
            { title: 'Created', data: 'created_at' },
            { title: 'Updated', data: 'updated_at' },
            { title: 'Actions', data: null, orderable: false, render: (data, type, row) => {
                if (row.deleted_at) {
                  return `<button class="reactivate-user" data-user-id="${row.id}">Reactivate</button> <button class="setpass-user" data-user-id="${row.id}">Set password</button>`;
                }
                return `<button class="deactivate-user" data-user-id="${row.id}">Deactivate</button> <button class="setpass-user" data-user-id="${row.id}">Set password</button>`;
              }
            }
          ]
        });

        $('#usersTable tbody').on('change', 'select.role-select', async function() {
          const userId = $(this).data('user-id');
          const role = $(this).val();
          try {
            const body = await $.ajax({
              url: `/api/v1/users/${userId}/role`,
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              data: JSON.stringify({ role }),
              dataType: 'json'
            });
            message.text(`User role updated: ${body.user.email} -> ${body.user.role}`).show();
            loadUsers();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Unable to update role').show();
          }
        });

        $('#usersTable tbody').on('click', 'button.deactivate-user', async function() {
          const userId = $(this).data('user-id');
          if (!confirm('Deactivate this user?')) return;
          try {
            const body = await $.ajax({
              url: `/api/v1/users/${userId}/deactivate`,
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              dataType: 'json'
            });
            message.text(body.message || 'User deactivated').show();
            loadUsers();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Unable to deactivate user').show();
          }
        });
        $('#usersTable tbody').on('click', 'button.reactivate-user', async function() {
          const userId = $(this).data('user-id');
          if (!confirm('Reactivate this user?')) return;
          try {
            const body = await $.ajax({
              url: `/api/v1/users/${userId}/reactivate`,
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              dataType: 'json'
            });
            message.text(body.message || 'User reactivated').show();
            loadUsers();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Unable to reactivate user').show();
          }
        });
        $('#usersTable tbody').on('click', 'button.setpass-user', async function() {
          const userId = $(this).data('user-id');
          const newPass = prompt('Enter new password for user (min 6 chars, include a number):');
          if (!newPass) return;
          if (newPass.length < 6 || !/\d/.test(newPass)) { alert('Password must be at least 6 characters and include a number'); return; }
          try {
            const body = await $.ajax({
              url: `/api/v1/users/${userId}/password`,
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              data: JSON.stringify({ newPassword: newPass }),
              dataType: 'json'
            });
            message.text(body.message || 'Password updated').show();
            loadUsers();
          } catch (xhr) {
            const body = xhr.responseJSON || {};
            message.text(body.error || 'Unable to set password').show();
          }
        });
      } else {
        window.userTable.clear().rows.add(users).draw();
      }
    }

    function showLoginModal() {
      $('#loginMsg').hide();
      $('#adminEmail').val('');
      $('#adminPassword').val('');
      $('#loginModal').css('display', 'flex');
    }

    function hideLoginModal() {
      $('#loginModal').hide();
      $('#loginMsg').hide();
    }

    $('#loginCancel').on('click', hideLoginModal);
    $('#loginSubmit').on('click', async () => {
      const email = $('#adminEmail').val().trim();
      const password = $('#adminPassword').val();
      if (!email || !password) {
        $('#loginMsg').text('Email and password required').show();
        return;
      }
      try {
        const data = await $.ajax({
          url: '/api/v1/login',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ email, password }),
          dataType: 'json'
        });
        if (!data.user || data.user.role !== 'admin') {
          $('#loginMsg').text('Admin access required. Please use an admin account.').show();
          return;
        }
        localStorage.setItem('bookverseToken', data.token);
        localStorage.setItem('bookverseUser', JSON.stringify(data.user));
        hideLoginModal();
        showAdminUI();
      } catch (xhr) {
        const data = xhr.responseJSON || {};
        $('#loginMsg').text(data.message || data.error || 'Login failed').show();
      }
    });
  </script>
</body>
</html>
